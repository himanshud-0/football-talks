# ═══════════════════════════════════════════════════════════════════════════
# FOOTBALL TALKS - APPLICATION CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════

# ─── Database Configuration ─────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/football_talks?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Football@00}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ─── Server Configuration ───────────────────────────────────────────────────
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# ─── JWT Configuration ──────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── CORS Configuration ─────────────────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ─── Logging ────────────────────────────────────────────────────────────────
logging.level.com.footballtalks=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# ─── Multipart / File Upload ────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Application Info ───────────────────────────────────────────────────────
spring.application.name=Football Talks Backend

# ─── API-Football Integration ───────────────────────────────────────────────
api.football.base-url=${API_FOOTBALL_BASE_URL:https://v3.football.api-sports.io}
api.football.key=${API_FOOTBALL_KEY:}
api.football.default-league=${API_FOOTBALL_DEFAULT_LEAGUE:39}
api.football.default-leagues=${API_FOOTBALL_DEFAULT_LEAGUES:39,140,78,135,61}
api.football.default-season=${API_FOOTBALL_DEFAULT_SEASON:2024}
api.football.max-page=${API_FOOTBALL_MAX_PAGE:2}
api.football.max-teams=${API_FOOTBALL_MAX_TEAMS:5}
api.football.persist-on-fetch=${API_FOOTBALL_PERSIST_ON_FETCH:true}
api.football.page-delay-ms=${API_FOOTBALL_PAGE_DELAY_MS:250}
api.football.cache-ttl-seconds=${API_FOOTBALL_CACHE_TTL_SECONDS:3600}
